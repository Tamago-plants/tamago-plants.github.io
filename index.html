<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0A0E1A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="icon" href="data:,">
<title>鑑定 — Hybrid Strategy Terminal</title>
<style>
:root{
  --bg:#0A0E1A; --panel:#111827; --panel2:#0D1320; --raise:#151D30; --line:#1F2A44;
  --text:#EDF1FA; --mut:#8C99B8; --dim:#586480;
  --A:#F0642F; --B:#3EC1CE; --ok:#3FC98B; --ng:#F0566F; --warn:#E5B454; --na:#586480;
  --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
  -webkit-font-smoothing:antialiased}
body{background:radial-gradient(1100px 540px at 50% -140px,#131E3C 0%,rgba(19,30,60,0) 62%),var(--bg)}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input{font-family:inherit;color:var(--text)}
button{transition:transform .07s ease,opacity .07s ease}
button:active{transform:scale(.965);opacity:.92}
button:focus-visible,input:focus-visible{outline:2px solid var(--B);outline-offset:2px}
a{color:inherit;text-decoration:none}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
.wrap{max-width:460px;margin:0 auto;padding:14px 14px 120px}
/* ------- ヘッダー ------- */
.hdr{position:sticky;top:0;z-index:20;background:rgba(10,14,26,.9);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line)}
.hdr-in{max-width:460px;margin:0 auto;padding:12px 14px 10px;display:flex;justify-content:space-between;align-items:center}
.eyebrow{font-family:var(--mono);font-size:9px;letter-spacing:.22em;color:var(--dim)}
.title{font-size:17px;font-weight:800;letter-spacing:.04em}
.gear{display:flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--line);
  border-radius:999px;padding:7px 11px;font-family:var(--mono);font-size:10px;color:var(--B)}
/* ------- 共通部品 ------- */
.card{background:linear-gradient(180deg,#141D33,#0F1626);border:1px solid #22304F;
  border-radius:20px;padding:16px;margin-bottom:12px;
  box-shadow:0 1px 0 rgba(255,255,255,.05) inset, 0 12px 32px rgba(0,0,0,.38), 0 2px 8px rgba(0,0,0,.28)}
.ey{font-family:var(--mono);font-size:10px;letter-spacing:.2em}
.card-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(31,42,68,.55)}
.row:last-child{border-bottom:none}
.row .l{display:flex;gap:9px;align-items:center;min-width:0}
.dot{width:17px;height:17px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:11px;flex:none}
.row .k{font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.row .v{font-family:var(--mono);font-size:13px;flex:none;padding-left:8px}
.stat{background:var(--panel2);border:1px solid rgba(31,42,68,.6);border-radius:14px;padding:12px}
.stat .lb{font-family:var(--mono);font-size:9px;letter-spacing:.2em;color:var(--dim)}
.stat .num{font-family:var(--mono);font-size:23px;font-weight:700;margin-top:3px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.note{font-size:10px;color:var(--dim);line-height:1.8;margin-top:12px}
.tag{font-size:12px;background:var(--panel2);border:1px solid var(--line);border-radius:999px;padding:5px 12px}
.tags{display:flex;flex-wrap:wrap;gap:6px}
.mk{font-family:var(--mono);font-size:9px;border:1px solid var(--dim);color:var(--mut);
  border-radius:4px;padding:1px 5px;letter-spacing:.05em;flex:none}
.err{background:rgba(240,86,111,.1);border:1px solid var(--ng);color:var(--ng);
  border-radius:14px;padding:12px 14px;font-size:13px;margin-bottom:12px;line-height:1.6}
.empty{background:var(--panel2);border:1px dashed var(--line);border-radius:20px;padding:30px 18px;text-align:center}
.empty .t{font-size:14px;font-weight:700;margin:6px 0 4px}
.empty .d{font-size:12px;color:var(--mut);line-height:1.9}
.sk{border-radius:8px;background:linear-gradient(90deg,#131B2E 25%,#1C2742 45%,#131B2E 65%);
  background-size:200% 100%;animation:sh 1.3s linear infinite}
@keyframes sh{to{background-position:-200% 0}}
/* ------- ピル/チップ ------- */
.pillrow{display:flex;gap:8px;margin-bottom:10px}
.pill{flex:1;border-radius:14px;padding:11px;font-weight:800;font-size:14px;
  background:var(--panel);border:1px solid var(--line);color:var(--mut)}
.pill.on-a{background:linear-gradient(180deg,#FF7A45,#E8551F);color:#fff;border-color:transparent;box-shadow:0 6px 18px rgba(240,100,47,.3)}
.pill.on-b{background:linear-gradient(180deg,#5AD6E2,#2FB4C2);color:#08131C;border-color:transparent;box-shadow:0 6px 18px rgba(62,193,206,.28)}
.chips{display:flex;gap:6px;align-items:center;margin-bottom:12px}
.chip{border-radius:999px;padding:6px 13px;font-size:12px;font-weight:700;
  background:var(--panel2);border:1px solid var(--line);color:var(--mut)}
.chip.on{background:var(--raise);border-color:var(--mut);color:var(--text)}
.chip.icon{margin-left:auto;font-family:var(--mono);display:flex;gap:5px;align-items:center;color:var(--dim)}
/* ------- 番付行 ------- */
.rk{width:100%;text-align:left;background:linear-gradient(180deg,#121A2C,#0F1524);
  border:1px solid var(--line);border-radius:16px;padding:11px 12px;margin-bottom:8px;
  display:flex;align-items:center;gap:10px;transition:transform .08s}
.rk:active{transform:scale(.985)}
.rk .no{font-family:var(--mono);font-size:11px;color:var(--dim);width:16px;text-align:center;flex:none}
.rk .mid{flex:1;min-width:0}
.rk .nm{font-size:14px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rk .sub{font-family:var(--mono);font-size:10px;color:var(--dim);display:flex;align-items:center;gap:5px;margin-top:2px}
.rk .right{flex:none;text-align:right}
.rk .mt{font-family:var(--mono);font-size:14px;font-weight:800}
.rk .dl{font-family:var(--mono);font-size:10px;margin-top:2px}
/* ------- 検索 ------- */
.sbox{display:flex;align-items:center;gap:9px;background:var(--panel);border:1px solid var(--line);
  border-radius:16px;padding:0 14px;margin-bottom:12px}
.sbox input{flex:1;background:none;border:none;padding:15px 0;font-size:16px;outline:none}
.sres{width:100%;text-align:left;display:flex;align-items:center;gap:10px;
  background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:8px}
/* ------- 詳細 ------- */
.back{display:flex;align-items:center;gap:6px;color:var(--mut);font-size:13px;font-weight:700;
  padding:2px 0 12px}
.hero .top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
.hero .code{font-family:var(--mono);font-size:11px;color:var(--mut);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.hero .nm{font-size:20px;font-weight:800;margin-top:2px}
.hero .px{font-family:var(--mono);font-size:26px;font-weight:800;text-align:right;letter-spacing:-.01em}
.hero .dl{font-family:var(--mono);font-size:12px;text-align:right;margin-top:2px}
.hero .as{font-family:var(--mono);font-size:9px;color:var(--dim);margin-top:10px;letter-spacing:.05em}
.seals{display:flex;gap:10px;margin-top:14px}
.sealbox{flex:1;background:var(--panel2);border:1px solid rgba(31,42,68,.6);border-radius:16px;
  padding:12px;display:flex;align-items:center;gap:11px}
.sealbox .m{font-family:var(--mono);font-size:9px;letter-spacing:.14em}
.sealbox .gl{font-size:12px;font-weight:700;margin-top:2px}
.sealbox .fp{font-family:var(--mono);font-size:10px;color:var(--dim);margin-top:1px}
.range{margin-top:6px}
.rtrack{position:relative;height:6px;border-radius:99px;background:var(--panel2);border:1px solid rgba(31,42,68,.6)}
.rfill{position:absolute;top:0;bottom:0;left:0;border-radius:99px;background:linear-gradient(90deg,#233252,#31456E)}
.rdot{position:absolute;top:50%;width:13px;height:13px;border-radius:50%;background:#fff;
  border:3px solid var(--bg);transform:translate(-50%,-50%);box-shadow:0 0 0 1px var(--line),0 0 12px rgba(255,255,255,.45)}
.rtick{position:absolute;top:-5px;bottom:-5px;width:3px;border-radius:2px;background:var(--B);transform:translateX(-50%)}
.rlbl{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--dim);margin-top:7px}
.act{display:flex;gap:8px;margin-bottom:12px}
.abtn{flex:1;background:linear-gradient(180deg,#17203A,#111A2E);border:1px solid #23325A;color:var(--text);box-shadow:inset 0 1px 0 rgba(255,255,255,.05);
  border-radius:14px;padding:12px;font-weight:700;font-size:13px;
  display:flex;align-items:center;justify-content:center;gap:7px}
.nw{display:flex;gap:9px;padding:7px 0;font-size:13px;line-height:1.55;border-bottom:1px solid rgba(31,42,68,.45)}
.nw:last-child{border-bottom:none}
.nw .d{font-family:var(--mono);font-size:10px;color:var(--dim);flex:none;padding-top:3px;width:34px}
.nw .src{font-size:10px;color:var(--dim);margin-top:1px}
.sub-lb{font-size:11px;color:var(--dim);margin:13px 0 7px;display:flex;justify-content:space-between;align-items:center}
.desc{font-size:13px;line-height:1.9;color:#D6DEF0}
.banner{background:rgba(62,193,206,.08);border:1px solid rgba(62,193,206,.4);color:var(--B);
  border-radius:14px;padding:11px 13px;font-size:12px;line-height:1.7;margin-bottom:12px}
/* ------- 電卓/シート ------- */
.f-lb{font-size:11px;color:var(--dim);margin-bottom:6px}
.f-in{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:14px;
  padding:13px;font-family:var(--mono);font-size:17px;outline:none;margin-bottom:12px}
.tri{display:flex;gap:8px;margin-bottom:12px}
.tri button{flex:1;border-radius:12px;padding:10px 4px;font-size:12px;font-weight:700;
  background:var(--panel2);border:1px solid var(--line);color:var(--mut)}
.tri button.on{background:var(--A);border-color:var(--A);color:#fff}
.tri button.on-b{background:var(--B);border-color:var(--B);color:#08131C}
.cres{background:var(--panel2);border:1px solid rgba(31,42,68,.6);border-radius:16px;padding:16px}
.cres .big{font-family:var(--mono);font-size:32px;font-weight:800}
.cline{display:flex;justify-content:space-between;font-size:12px;color:var(--mut);padding:3px 0}
.ovl{position:fixed;inset:0;z-index:30;background:rgba(0,0,0,.62);display:flex;align-items:flex-end;justify-content:center}
.sheet{width:100%;max-width:460px;background:var(--panel);border:1px solid var(--line);
  border-radius:24px 24px 0 0;padding:22px 18px calc(28px + env(safe-area-inset-bottom));
  max-height:86vh;overflow-y:auto}
.sheet::before{content:"";display:block;width:38px;height:4px;border-radius:99px;background:#2A3552;margin:-4px auto 16px}
.sheet h2{font-size:16px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.hr{border-top:1px solid var(--line);margin:16px 0}
.setrow{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.setrow input{width:80px;background:var(--panel2);border:1px solid var(--line);border-radius:12px;
  padding:10px;font-family:var(--mono);font-size:16px;outline:none}
.edrow{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 0;
  border-bottom:1px solid rgba(31,42,68,.5)}
.edrow .k{font-size:13px}
.edrow input{width:118px;background:var(--panel2);border:1px solid var(--line);border-radius:10px;
  padding:9px;font-family:var(--mono);font-size:15px;outline:none;text-align:right}
.btn-danger{width:100%;border-radius:14px;padding:13px;font-weight:700;font-size:14px;
  background:var(--panel2);border:1px solid var(--line);color:var(--ng)}
.btn-danger.arm{background:var(--ng);border-color:var(--ng);color:#fff}
.spin{display:inline-block;width:13px;height:13px;border:2px solid currentColor;border-top-color:transparent;
  border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px}
@keyframes sp{to{transform:rotate(360deg)}}
.dc{display:flex;align-items:center;gap:10px;background:var(--panel2);border:1px solid var(--line);
  border-radius:14px;padding:10px 12px;margin-bottom:8px}
.dc-add{border-radius:10px;padding:8px 11px;font-size:12px;font-weight:800;flex:none}
.vline{display:flex;gap:8px;font-size:13px;line-height:1.75;padding:3px 0;color:#D6DEF0}
.vline span:first-child{flex:none;font-weight:800}
.vdot{width:19px;height:19px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex:none;margin-top:2px}
.vact{margin-top:10px;font-size:12px;background:rgba(62,193,206,.07);border:1px solid;border-radius:12px;padding:10px 12px;line-height:1.75}
/* ------- ナビ ------- */
.nav{position:fixed;bottom:0;left:0;right:0;z-index:20;background:rgba(10,14,26,.94);
  backdrop-filter:blur(10px);border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom)}
.nav-in{max-width:460px;margin:0 auto;display:flex}
.nav button{flex:1;padding:11px 0 9px;display:flex;flex-direction:column;align-items:center;gap:3px;
  color:var(--dim);font-size:10px;font-weight:700}
.nav button.on{color:var(--text)}
.nav button.on svg{filter:drop-shadow(0 0 7px rgba(62,193,206,.6))}
.nav svg{width:20px;height:20px}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation-duration:.01s!important}}
</style>
</head>

  const N=v.length,xm=(N-1)/2,ym=v.reduce((a,b)=>a+b,0)/N;let nu=0,de=0;
  v.forEach((y,i)=>{nu+=(i-xm)*(y-ym);de+=(i-xm)**2;});
  const base=v.reduce((a,b)=>a+Math.abs(b),0)/N||1,sl=nu/de/base;
  const drop=v.some((x,i)=>i<N-1&&x>0&&v[i+1]<x*0.7);
  if(drop)return{label:"不安定",ok:false};
  if(sl>0.03)return{label:"右肩上がり",ok:true};
  if(sl>=-0.03)return{label:"横ばい",ok:true};
  return{label:"下降",ok:false};}

async function ensureMkt(force){

    .filter(k=>{const c=state.mktCache[k];return force||!c||Date.now()-c.ts>5*60*1000;});
  if(!need.length)return;

const hit=(s,L)=>{s=(s||"");return L.some(k=>s.includes(k));};

function scoreA(m){
  const max=m.mkt==="US"?350:50000;

  const t=epsTrend(m.hist);
  const perPass=(m.per==null&&realPer==null)?null:((m.per!=null&&m.per<=10)||(realPer!=null&&realPer<=10));
  const rows=[
    {k:m.mkt==="US"?"時価総額 3.5億ドル未満":"時価総額 500億円未満",pk:"会社の大きさ（小型か）",
     p:m.mcap==null?null:m.mcap<max,v:fmtCap(m.mcap,m.ccy),pv:fmtCap(m.mcap,m.ccy)},
    {k:"PER 10倍以下（実質可）",pk:"利益に対して安いか",
     p:perPass,
     v:em(m.code,"eps_f",(m.per==null?"—":m.per.toFixed(1)+"倍")+(realPer!=null?"／実質"+(realPer<0?"EV<0":realPer.toFixed(1)):"")),
     pv:em(m.code,"eps_f",realPer!=null&&realPer<=0?"実質タダ以下":(m.per==null?"—":"利益"+m.per.toFixed(1)+"年分"))},
    {k:"PBR 1倍以下",pk:"純資産と比べて安いか",
     p:m.bpsNeg?false:(m.pbr==null?null:m.pbr<=1),
     v:m.bpsNeg?"BPS≦0":em(m.code,"bps",fx2(m.pbr,"倍")),
     pv:m.bpsNeg?"純資産マイナス（要注意）":(m.pbr==null?"—":em(m.code,"bps","純資産の"+m.pbr.toFixed(2)+"倍"))},
    {k:"ネットキャッシュ プラス",pk:"借金差引後の手元資金",
     p:m.ncps==null?null:m.ncps>0,v:em(m.code,"ncps",fmtCap(m.nc,m.ccy)),pv:em(m.code,"ncps",fmtCap(m.nc,m.ccy))},
    {k:"NC比率 0.8以上",pk:"手元資金 ÷ 会社の値段",
     p:m.ncr==null?null:m.ncr>=0.8,

     pv:m.ncr==null?"—":em(m.code,"ncps",m.ncr.toFixed(2)+(m.ncr>=1?"（お釣りが来る）":""))},
  ];
  const t2=t, catal=m.payout!=null&&m.payout<=20&&t2.ok===true;

  else if(fails===1){g="△";gl="あと1条件";}

  else if(m.ncr>=1){g="◎";gl="超割安・要監視";}
  else{g="○";gl="割安・準監視";}
  const cnt=rows.length-nulls,fit=cnt?(cnt-fails)/cnt:0;
  return{rows,realPer,trend:t,catal,g,gl,fit};
}
function scoreB(m){

     pv:em(m.code,"cut10",m.cut==null?"不明":(m.cut?"10年内にあり":"10年なし")),hard:true},

     v:em(m.code,"eps_f",fx2(m.per,"倍",1)),pv:m.per==null?"—":em(m.code,"eps_f","利益"+m.per.toFixed(1)+"年分"),hard:true},
    {k:"PBR 1.3倍以下（参考）",pk:"純資産との比較（参考）",p:m.bpsNeg?null:(m.pbr==null?null:m.pbr<=1.3),
     v:m.bpsNeg?"BPS≦0（買収/還元由来か要確認）":em(m.code,"bps",fx2(m.pbr,"倍")),

     v:em(m.code,"eq",fx2(m.eq,"%",0))+(isFin?"（個別判断）":""),

    {k:"対象業種",pk:"商売の種類",p:scls!=="out",
     v:scls==="core"?"ディフェンシブ核":scls==="mkt"?"市況枠（25%上限）":(sec||"—"),
     pv:scls==="core"?"不況に強い分野":scls==="mkt"?"景気に左右（枠25%まで）":(sec||"—")+"（対象外）",hard:true},
  ];

  const cnt=rows.length-nulls,fails=rows.filter(r=>r.p===false).length,fit=cnt?(cnt-fails)/cnt:0;
  return{rows,thr:T,target,gap,trend:t,g,gl,fit};

const gCol=g=>g==="◎"?"var(--ok)":g==="○"?"var(--warn)":g==="△"?"var(--mut)":g==="×"?"var(--ng)":"var(--na)";
function verdict(m,sA,sB){
  const GRv={"◎":4,"○":3,"△":2,"?":1,"×":0};
  const useB=GRv[sB.g]>GRv[sA.g]||(GRv[sB.g]===GRv[sA.g]&&sB.fit>=sA.fit);
  const pros=[],cons=[];let title="",act="";
  if(useB){
    if(m.yld!=null){ if(m.yld>=sB.thr)pros.push("配当が年"+m.yld.toFixed(2)+"%。100万円分で年約"+Math.round(m.yld*1e4).toLocaleString()+"円");
      else cons.push("今の株価だと配当は年"+m.yld.toFixed(2)+"%で、基準"+sB.thr.toFixed(1)+"%に届かない"); }
    if(m.cut===false)pros.push("過去10年、配当を減らしていない");
    if(m.cut===true)cons.push("過去10年内に減配の歴史あり");
    if(m.payout!=null&&m.payout>0&&m.payout<=70)pros.push("利益の"+Math.round(m.payout)+"%だけを配当に回す無理のない体質");
    if(m.payout!=null&&m.payout>70)cons.push("利益のほとんどを配当に回していて余力が薄い");
    if(sB.trend.ok===true)pros.push("利益は"+sB.trend.label);
    if(sB.trend.ok===false)cons.push("利益が"+sB.trend.label+"ぎみで安定感に欠ける");
    title=sB.g==="◎"?"今が買い値ゾーン。永久保有向きの高配当":
      sB.g==="○"?"良い会社。あと少し安くなれば買い":
      sB.g==="?"?"判定にはデータがもう少し必要":"高配当株としては条件不足";
    if(sB.target!=null&&sB.gap!=null&&sB.gap<0)act="あと"+Math.abs(sB.gap).toFixed(1)+"%下の "+money(sB.target,m.ccy)+" まで来たら基準クリア。指値の目安に";
    else if(sB.g==="◎")act="ルール上は買っていい価格帯。分散と2%ルールは忘れずに";
  }else{
    if(m.ncr!=null&&m.ncr>=1)pros.push("借金を引いた手元資金が会社の値段を上回る＝事業がタダで付いてくる計算");
    else if(m.ncr!=null&&m.ncr>=0.8)pros.push("手元資金が会社の値段の約"+Math.round(m.ncr*100)+"%ぶんある");
    if(sA.realPer!=null&&sA.realPer<=0)pros.push("手元資金を差し引くと実質タダ以下の値段");
    if(m.pbr!=null&&m.pbr<=1&&!m.bpsNeg)pros.push("純資産の"+m.pbr.toFixed(2)+"倍＝解散価値以下の値段");
    if(sA.catal)pros.push("配当余力たっぷり×利益成長中。増配・自社株買い発表で化けやすい");
    sA.rows.forEach(r=>{if(r.p===false&&cons.length<2)cons.push((r.pk||r.k)+"が条件外");});
    title=sA.g==="◎"?"超割安。監視リスト筆頭クラス":
      sA.g==="○"?"割安。準監視リスト入り":
      sA.g==="△"?"惜しい。あと1条件で監視入り":
      sA.g==="?"?"判定にはデータがもう少し必要":"割安株としては対象外";
    if(sA.g==="◎"||sA.g==="○")act="今すぐ買う銘柄ではなく「待ち伏せ」。増配・自社株買いのニュースが出た瞬間が動く合図";
  }
  if((useB&&sB.g==="?")||(!useB&&sA.g==="?"))act="「数値を直す」で足りない数字を入れると判定が完成する";
  return{title,pros:pros.slice(0,3),cons:cons.slice(0,2),act,mode:useB?"B":"A",col:useB?"var(--B)":"var(--A)"};
}

}
function miniRange(lo,hi,p,w,h){
  if(lo==null||hi==null||p==null||hi<=lo)return '<svg width="'+w+'" height="'+h+'" style="flex:none"><line x1="2" y1="'+(h/2)+'" x2="'+(w-2)+'" y2="'+(h/2)+'" stroke="#2A3556" stroke-width="1.5" stroke-dasharray="3 4"/></svg>';
  const x=2+(w-4)*Math.max(0,Math.min(1,(p-lo)/(hi-lo)));
  return '<svg width="'+w+'" height="'+h+'" style="flex:none"><line x1="2" y1="'+(h/2)+'" x2="'+(w-2)+'" y2="'+(h/2)+'" stroke="#2A3556" stroke-width="2" stroke-linecap="round"/><circle cx="'+x.toFixed(1)+'" cy="'+(h/2)+'" r="3.4" fill="#EDF1FA"/></svg>';
}
function rangeBar(lo,hi,price,target,ccy){
  if(lo==null||hi==null||price==null||hi<=lo)return"";
  const pos=v=>Math.max(0,Math.min(100,(v-lo)/(hi-lo)*100));
  const tIn=target!=null&&target>lo*0.85&&target<hi*1.15;
  return '<div class="range"><div class="rtrack"><div class="rfill" style="width:'+pos(price).toFixed(1)+'%"></div>'
    +(tIn?'<div class="rtick" style="left:'+pos(target).toFixed(1)+'%"></div>':"")
    +'<div class="rdot" style="left:'+pos(price).toFixed(1)+'%"></div></div>'
    +'<div class="rlbl"><span>安 '+money(lo,ccy)+'</span>'
    +(tIn?'<span style="color:var(--B)">┃到達 '+money(target,ccy)+'</span>':"")
    +'<span>高 '+money(hi,ccy)+'</span></div></div>';
}

/* ============ 価格更新 ============ */
function netErr(e){return IN_CLAUDE
  ?"Claude内プレビューは外部通信が遮断されるため株価ライブ取得は不可。焼き込み時点（"+ASOF+"）の株価で判定中。tiiny等に置いたサイトで開けばライブになる。"
  :(/load failed|failed to fetch/i.test((e&&e.message)||"")
    ?"外部データ通信がブロックされた。ホスティング先のセキュリティ制限（CSP）か回線の問題。GitHub Pages等のCSP無しホストなら動く。"
    :((e&&e.message)||"TradingViewからの取得に失敗。回線を確認して少し待って再試行を。"));}
async function refreshAll(force){
  if(state.busyPx)return;
  const codes=allCodes();
  const stale=codes.some(c=>{const p=state.px[c];return !p||!p.ts||Date.now()-p.ts>10*60*1000;});
  if(!force&&!stale)return;
  state.busyPx=true;state.err=null;render();
  try{
    const jp=[],us=[],map={};
    codes.forEach(c=>{const r=recOf(c);if(!r)return;
      if(r.mkt==="JP"){const s="TSE:"+c;jp.push(s);map[s]=c;}
      else{const s1="NYSE:"+c,s2="NASDAQ:"+c;
        us.push(s1);map[s1]=c;us.push(s2);map[s2]=c;}});
    const both=await Promise.all([
      jp.length?tvScan("japan",jp):Promise.resolve({}),
      us.length?tvScan("america",us):Promise.resolve({})]);
    const res=Object.assign({},both[0],both[1]),now=Date.now();
    Object.keys(res).forEach(s=>{const c=map[s],d=res[s];
      if(c&&d&&d.p!=null)state.px[c]={p:d.p,chg:d.chg,hi:d.hi,lo:d.lo,ts:now};});
    saveAll();
  }catch(e){state.err=netErr(e);}
  state.busyPx=false;render();
}
async function refreshOne(code){
  if(state.busyOne)return;
  state.busyOne=true;state.err=null;render();
  try{
    const r=recOf(code);
    const tick=r.mkt==="JP"?["TSE:"+code]:["NYSE:"+code,"NASDAQ:"+code];
    const res=await tvScan(r.mkt==="JP"?"japan":"america",tick);
    const key=Object.keys(res).find(s=>res[s]&&res[s].p!=null);
    if(!key)throw new Error("株価が見つからない");
    const d=res[key];
    state.px[code]={p:d.p,chg:d.chg,hi:d.hi,lo:d.lo,ts:Date.now()};
    saveAll();
  }catch(e){state.err=netErr(e);}
  state.busyOne=false;render();
}
/* ============ カスタム銘柄 ============ */
async function addCustom(q){
  const raw=cc(q); if(!raw)return;
  state.busyOne=true;state.err=null;render();
  try{
    const isJP=/^\d{4}[A-Z]?$/.test(raw);
    const tick=isJP?["TSE:"+raw]:["NYSE:"+raw,"NASDAQ:"+raw];
    const res=await tvScan(isJP?"japan":"america",tick);
    const key=Object.keys(res).find(s=>res[s]&&res[s].p!=null);
    if(!key)throw new Error("TradingViewで見つからないコード: "+raw);
    const d=res[key];
    state.custom[raw]={custom:true,mkt:isJP?"JP":"US",ccy:isJP?"JPY":"USD",
      asof:new Date().toISOString().slice(0,10),ysym:key,n:d.desc||raw,s:"",d:"未収録銘柄。「数値を直す」からファンダを手入力すると完全判定できる。",l:[],
      sh:null,eps_f:null,bps:null,dps:null,payout:null,ncps:null,eq:null,hist:[],cut10:null};
    state.px[raw]={p:d.p,chg:d.chg,hi:d.hi,lo:d.lo,ts:Date.now()};
    state.cur=raw;state.view="detail";state.q="";
    saveAll();
  }catch(e){state.err=e.message||"取得に失敗した";}
  state.busyOne=false;render();
}
function removeCustom(code){
  delete state.custom[code];delete state.px[code];delete state.ov[code];
  state.cur=null;state.view="home";saveAll();render();
}

function checkRow(r){

  const col=r.p===true?"var(--ok)":r.p===false?"var(--ng)":"var(--na)";

function pc(s){const ok=s.rows.filter(r=>r.p===true).length;return ok+"/"+s.rows.length+"クリア";}
function passRatio(s){return s.rows.filter(r=>r.p===true).length/(s.rows.length||1);}

      .sort((a,b)=>{const sa=state.rankMode==="A"?a.sA:a.sB, sb=state.rankMode==="A"?b.sA:b.sB;

          ?((b.m.ncr??-99)-(a.m.ncr??-99)):((b.m.yld??-99)-(a.m.yld??-99)));});

    mktRegions().forEach(mkt=>{const c=state.mktCache[state.rankMode+"_"+mkt];if(c)rows=rows.concat(c.rows);});

function calcResult(){
  const A=num(state.calc.assets),E=num(state.calc.entry);
  if(!A||!E||E<=0)return null;
  const isUS=state.calc.market==="US";
  const fxv=isUS?num(state.calc.fx):1;
  if(isUS&&(!fxv||fxv<=0))return{needFx:true};
  const lot=isUS?1:100,total=A*10000;
  const stop=state.calc.ctype==="ignite"?E*0.92:state.calc.ctype==="plan"?E*0.75:num(state.calc.stop);
  if(stop==null||stop>=E)return{bad:state.calc.ctype==="manual"?"ストップは建値より下に置く":null};
  const riskY=(E-stop)*fxv,eY=E*fxv,allow=total*0.02;
  const byRisk=Math.floor(allow/riskY/lot)*lot;
  const aCap=total*0.15,byCap=Math.floor(aCap/eY/lot)*lot;
  const shares=Math.max(0,Math.min(byRisk,byCap));
  return{stop,riskY,allow,shares,invest:shares*eY,bind:byRisk<=byCap?"2%ルール":"A枠15%",
    lot,tranche:Math.floor(shares/(3*lot))*lot,ccy:isUS?"USD":"JPY"};
}
function renderCalcOut(){
  const el=document.getElementById("calcOut");if(!el)return;
  const r=calcResult();
  if(!r){el.innerHTML="";return;}
  if(r.needFx){el.innerHTML='<div style="font-size:12px;color:var(--warn)">為替レートを入れる（「自動取得」も使える）</div>';return;}
  if(r.bad){el.innerHTML='<div style="font-size:12px;color:var(--ng)">'+esc(r.bad)+'</div>';return;}
  let h='<div class="cres"><div class="mono" style="font-size:9px;letter-spacing:.2em;color:var(--dim)">MAX POSITION</div>'
    +'<div class="big" style="color:'+(r.shares>0?"var(--A)":"var(--ng)")+'">'+r.shares.toLocaleString()+'<span style="font-size:15px;color:var(--mut)"> 株</span></div>';
  if(r.shares===0){h+='<div style="font-size:12px;color:var(--ng);margin-top:4px">2%ルール内で買える'+(r.lot===100?"単元":"株数")+'がない。リスク過大。</div>';}
  else{h+='<div style="margin-top:8px">'
    +'<div class="cline"><span>許容損失（総資産×2%）</span><span class="mono">'+yenI(r.allow)+'</span></div>'
    +'<div class="cline"><span>ストップ位置</span><span class="mono">'+money(r.stop,r.ccy)+'（1株の想定損失 '+yenI(r.riskY)+'）</span></div>'
    +'<div class="cline"><span>概算投入額</span><span class="mono">'+yenI(r.invest)+'</span></div>'
    +'<div class="cline"><span>制約になった条件</span><span class="mono" style="color:var(--warn)">'+r.bind+'</span></div>'
    +(state.calc.ctype==="plan"?'<div class="cline"><span>3トランシェ目安/回</span><span class="mono">'+r.tranche.toLocaleString()+'株</span></div>':"")
    +'</div>';}
  h+='</div>';el.innerHTML=h;
}

function render(){
  const c=document.getElementById("thrChip");
  if(c)c.textContent="JP "+thrFor("JP").toFixed(1)+" / US "+thrFor("US").toFixed(2)+"%";
  ["home","search","calc"].forEach(t=>{
    const b=document.getElementById("nav-"+t);
    if(b)b.classList.toggle("on",state.view===t||(t==="home"&&state.view==="detail"));
  });
  if(state.view==="home")renderHome();
  else if(state.view==="search")renderSearch();
  else if(state.view==="detail")renderDetail();
  else renderCalc();
  renderSheet();
}

/* ============ 起動 ============ */
(async()=>{
  const s=await store.load();
  if(s){
    if(s.set&&s.set.jp&&s.set.us)state.set=s.set;
    if(s.ov)state.ov=s.ov;
    if(s.custom)state.custom=s.custom;
    if(s.px)state.px=s.px;
    if(s.fxAuto)state.fxAuto=s.fxAuto;
    if(typeof s.simple==="boolean")state.simple=s.simple;
  }
  /* 同フォルダの dataset.json があれば焼き込みより優先（ホスティング時の更新用） */
  try{
    const r=await fetch("dataset.json",{cache:"no-store"});
    if(r.ok){const j=await r.json();
      if(j&&j.stocks){Object.assign(DATA,j.stocks);if(j.asof){/* asof表示は焼き込み優先のまま簡略 */}}}
  }catch(e){}
  render();
  refreshAll(false);
  ensureMkt(false);
})();
